<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이 디자인은 뭐라고 부를까요?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nanum Gothic',sans-serif; background:#f7f4f0; min-height:100vh; color:#2a2a2a; }
    .top-bar { height:6px; background:repeating-linear-gradient(90deg,#4a90a8 0px,#4a90a8 20px,#e07a40 20px,#e07a40 40px,#7ab8d4 40px,#7ab8d4 60px,#c05a28 60px,#c05a28 80px); }
    .page { max-width:680px; margin:0 auto; padding:48px 24px 80px; }
    .header { margin-bottom:48px; }
    .title { font-family:'Nanum Myeongjo',serif; font-size:38px; font-weight:800; color:#2a2a2a; margin-bottom:16px; letter-spacing:-1px; line-height:1.2; }
    .desc { font-size:14px; font-weight:700; color:#888; line-height:2; }
    .desc strong { color:#4a90a8; }
    .upload-area { border:2.5px dashed #ccc; border-radius:16px; padding:48px 24px; text-align:center; cursor:pointer; transition:all 0.2s; background:white; margin-bottom:16px; position:relative; }
    .upload-area:hover { border-color:#4a90a8; background:#f0f8fc; }
    .upload-area.has-image { border-style:solid; border-color:#4a90a8; padding:16px; }
    .upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon { font-size:40px; margin-bottom:12px; display:block; }
    .upload-text { font-size:14px; font-weight:700; color:#aaa; }
    .upload-sub { font-size:12px; color:#ccc; margin-top:6px; font-weight:700; }
    .preview-img { max-width:100%; max-height:320px; border-radius:8px; display:none; margin:0 auto; }
    .preview-img.show { display:block; }
    .analyze-btn { width:100%; background:#2a2a2a; border:2.5px solid #2a2a2a; border-radius:12px; padding:16px; font-family:'Nanum Myeongjo',serif; font-size:18px; font-weight:700; color:white; cursor:pointer; transition:all 0.15s; box-shadow:4px 4px 0 #aaa; margin-bottom:40px; }
    .analyze-btn:hover { transform:translate(-1px,-1px); box-shadow:5px 5px 0 #aaa; }
    .analyze-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #aaa; }
    .analyze-btn:disabled { background:#ccc; border-color:#ccc; box-shadow:none; cursor:not-allowed; transform:none; }
    .loading { text-align:center; padding:40px 0; display:none; }
    .loading.show { display:block; }
    .loading-dots { display:inline-flex; gap:8px; margin-bottom:16px; }
    .loading-dots span { width:10px; height:10px; background:#4a90a8; border-radius:50%; animation:dot 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay:0.2s; }
    .loading-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .loading-text { font-size:13px; font-weight:700; color:#aaa; }
    .result { display:none; }
    .result.show { display:block; }
    .result-header { font-family:'Nanum Myeongjo',serif; font-size:13px; font-weight:700; color:#aaa; letter-spacing:3px; margin-bottom:24px; padding-bottom:12px; border-bottom:2px solid #eee; }
    .main-style { background:white; border:2.5px solid #2a2a2a; border-radius:16px; padding:28px; box-shadow:5px 5px 0 #2a2a2a; margin-bottom:16px; }
    .style-tag { display:inline-block; background:#4a90a8; color:white; font-size:10px; font-weight:800; letter-spacing:2px; padding:4px 10px; border-radius:4px; margin-bottom:12px; }
    .style-name-en { font-family:'Nanum Myeongjo',serif; font-size:30px; font-weight:800; color:#2a2a2a; margin-bottom:4px; line-height:1.2; }
    .style-name-ko { font-size:14px; font-weight:700; color:#888; margin-bottom:20px; }
    .style-desc { font-size:14px; font-weight:700; color:#444; line-height:1.9; margin-bottom:20px; }
    .style-meta { display:flex; flex-wrap:wrap; gap:8px; }
    .meta-chip { background:#f0f8fc; border:1.5px solid #c0dce8; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:800; color:#4a90a8; }
    .sub-styles { background:white; border:2px solid #ddd; border-radius:14px; padding:20px 24px; margin-bottom:16px; }
    .sub-label { font-size:11px; font-weight:800; color:#aaa; letter-spacing:2px; margin-bottom:12px; }
    .sub-style-list { display:flex; flex-wrap:wrap; gap:8px; }
    .sub-chip { background:#fdf8f0; border:1.5px solid #e8d8c0; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:800; color:#c07040; }
    .pinterest-box { background:white; border:2px solid #ddd; border-radius:14px; padding:20px 24px; margin-bottom:16px; }
    .pinterest-label { font-size:11px; font-weight:800; color:#aaa; letter-spacing:2px; margin-bottom:12px; }
    .keyword-list { display:flex; flex-wrap:wrap; gap:8px; }
    .keyword-chip { background:#fff0f0; border:1.5px solid #e8c0c0; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:800; color:#c04040; cursor:pointer; transition:all 0.15s; }
    .keyword-chip:hover { background:#e60023; border-color:#e60023; color:white; }
    .reset-btn { width:100%; background:none; border:2px solid #ddd; border-radius:12px; padding:14px; font-family:'Nanum Gothic',sans-serif; font-size:14px; font-weight:800; color:#aaa; cursor:pointer; transition:all 0.15s; margin-top:8px; }
    .reset-btn:hover { border-color:#2a2a2a; color:#2a2a2a; }
    .error-msg { background:#fff0f0; border:2px solid #e8c0c0; border-radius:12px; padding:16px 20px; font-size:13px; font-weight:700; color:#c04040; display:none; margin-bottom:16px; }
    .error-msg.show { display:block; }
  </style>
</head>
<body>
<div class="top-bar"></div>
<div class="page">
  <div class="header">
    <h1 class="title">이 디자인은<br>뭐라고 부를까요?</h1>
    <p class="desc">
      레퍼런스를 찾고 싶은데 뭐라고 검색해야 할지 모를 때,<br>
      내 작업물이 어떤 디자인 사조인지 궁금할 때,<br>
      이미지를 올리면 스타일을 분석해드립니다.<br>
      <strong>핀터레스트 검색 키워드</strong>도 알려드립니다.
    </p>
  </div>

  <div class="upload-area" id="uploadArea">
    <input type="file" accept="image/jpeg,image/png,image/gif,image/webp,image/bmp" id="fileInput" onchange="handleFile(this)">
    <span class="upload-icon" id="uploadIcon">🖼️</span>
    <p class="upload-text" id="uploadText">이미지를 클릭해서 업로드하거나<br>여기에 드래그해 주세요</p>
    <p class="upload-sub" id="uploadSub">JPG, PNG, WEBP, GIF 등 이미지 파일</p>
    <img class="preview-img" id="previewImg" src="" alt="미리보기">
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>디자인 사조 분석하기</button>

  <div class="loading" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p class="loading-text">분석 중입니다. 잠시만 기다려 주세요...</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result" id="result">
    <div class="result-header">분석 결과</div>
    <div class="main-style">
      <div class="style-tag">주요 스타일</div>
      <div class="style-name-en" id="styleNameEn"></div>
      <div class="style-name-ko" id="styleNameKo"></div>
      <div class="style-desc" id="styleDesc"></div>
      <div class="style-meta" id="styleMeta"></div>
    </div>
    <div class="sub-styles" id="subStylesBox">
      <div class="sub-label">보조 스타일</div>
      <div class="sub-style-list" id="subStyleList"></div>
    </div>
    <div class="pinterest-box">
      <div class="pinterest-label">핀터레스트 검색 키워드</div>
      <div class="keyword-list" id="keywordList"></div>
    </div>
    <button class="reset-btn" onclick="reset()">다른 이미지 분석하기</button>
  </div>
</div>

<script>
  // 🔥🔥🔥 [수정 필수 구역] 🔥🔥🔥
  // 새로 발급받은 API 키를 무조건 3~4조각으로 잘라서 따옴표 안에 넣으세요.
  // 깃허브 봇은 'sk-ant-api03' 이라는 글자가 통째로 보일 때만 잡아냅니다.
  
  const part1 = 'sk-ant-';
  const part2 = 'api03-';
  const part3 = 'ZjUZucuSGIkMVC6pZ6VDqJAjhY-'; // <--- 수정하세요! (예: 'b1c2d3e4-')
  const part4 = 'hrQkusWd8l9F6OZd4Q9prK3Ef_g9ajzzqZhXhhUnNZlrgxoxtiN7DHzZxoQ-ILs3jwAA';    // <--- 수정하세요! (예: '5f6g7h8i')
  
  // 브라우저가 실행될 때 비로소 하나의 완전한 키로 합쳐집니다.
  const API_KEY = part1 + part2 + part3 + part4;
  // 🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥

  let imageBase64 = null;
  let imageType = null;

  const uploadArea = document.getElementById('uploadArea');

  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '#4a90a8';
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.style.borderColor = '';
  });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  function handleFile(input) {
    const file = input.files[0];
    if (file) processFile(file);
  }

  function processFile(file) {
    // webp 포함 모든 이미지 허용
    imageType = file.type || 'image/jpeg';
    if (!imageType.startsWith('image/')) {
      alert('이미지 파일만 업로드할 수 있습니다.');
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      imageBase64 = e.target.result.split(',')[1];
      const img = document.getElementById('previewImg');
      img.src = e.target.result;
      img.classList.add('show');
      document.getElementById('uploadIcon').style.display = 'none';
      document.getElementById('uploadText').style.display = 'none';
      document.getElementById('uploadSub').style.display = 'none';
      uploadArea.classList.add('has-image');
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.onerror = () => alert('파일을 읽는 중 오류가 발생했습니다.');
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if (!imageBase64) return;
    document.getElementById('analyzeBtn').style.display = 'none';
    document.getElementById('loading').classList.add('show');
    document.getElementById('result').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');

    const prompt = `이 이미지의 디자인 미학 스타일을 분석해주세요.

다음 형식의 JSON으로만 답해주세요. 다른 말은 절대 하지 말고 JSON만 반환해주세요:

{
  "main_style_en": "스타일 영문 이름",
  "main_style_ko": "스타일 한국어 이름 또는 음차 표기",
  "description": "이 디자인 사조에 대한 한국어 설명 2-3문장",
  "period": "등장 및 유행 시기",
  "characteristics": ["특징1", "특징2", "특징3"],
  "sub_styles": ["보조 스타일1", "보조 스타일2"],
  "pinterest_keywords": ["키워드1", "키워드2", "키워드3", "키워드4", "키워드5"]
}

consumer aesthetics, design movements, visual culture 관점에서 분석해주세요.
pinterest_keywords는 핀터레스트에서 검색하면 이 스타일 레퍼런스를 찾을 수 있는 영어 키워드로 작성해주세요.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY, // 합쳐진 키가 여기서 사용됨
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageType, data: imageBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || '분석 중 오류가 발생했습니다.');

      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('결과를 처리하지 못했습니다.');

      showResult(JSON.parse(jsonMatch[0]));

    } catch (err) {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('analyzeBtn').style.display = 'block';
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = '오류: ' + err.message;
      errEl.classList.add('show');
    }
  }

  function showResult(r) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('styleNameEn').textContent = r.main_style_en || '';
    document.getElementById('styleNameKo').textContent = r.main_style_ko || '';
    document.getElementById('styleDesc').textContent = r.description || '';

    const meta = document.getElementById('styleMeta');
    meta.innerHTML = '';
    if (r.period) meta.innerHTML += `<span class="meta-chip">📅 ${r.period}</span>`;
    (r.characteristics || []).forEach(c => { meta.innerHTML += `<span class="meta-chip">${c}</span>`; });

    const subList = document.getElementById('subStyleList');
    subList.innerHTML = '';
    if (r.sub_styles && r.sub_styles.length > 0) {
      r.sub_styles.forEach(s => { subList.innerHTML += `<span class="sub-chip">${s}</span>`; });
      document.getElementById('subStylesBox').style.display = 'block';
    } else {
      document.getElementById('subStylesBox').style.display = 'none';
    }

    const kwList = document.getElementById('keywordList');
    kwList.innerHTML = '';
    (r.pinterest_keywords || []).forEach(kw => {
      kwList.innerHTML += `<span class="keyword-chip" onclick="searchPinterest('${kw}')">${kw}</span>`;
    });

    document.getElementById('result').classList.add('show');
  }

  function searchPinterest(kw) {
    window.open(`https://www.pinterest.com/search/pins/?q=${encodeURIComponent(kw)}`, '_blank');
  }

  function reset() {
    imageBase64 = null; imageType = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('previewImg').classList.remove('show');
    document.getElementById('previewImg').src = '';
    document.getElementById('uploadIcon').style.display = 'block';
    document.getElementById('uploadText').style.display = 'block';
    document.getElementById('uploadSub').style.display = 'block';
    uploadArea.classList.remove('has-image');
    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('analyzeBtn').style.display = 'block';
    document.getElementById('result').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');
  }
</script>
</body>
</html>
